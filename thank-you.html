<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Jiangfan Jewelry</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --bg: #050505;
      --panel: #0d0d0f;
      --border: rgba(255,255,255,0.08);
      --text: #f3efe7;
      --muted: rgba(243,239,231,0.72);
      --gold: #d4ab5f;
      --gold-dark: #b78c3e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(212,171,95,0.12), transparent 30%),
        #050505;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 42px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(212,171,95,0.28);
      background: rgba(212,171,95,0.08);
      color: #f0cf92;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.04;
    }

    p {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.7;
      color: var(--muted);
    }

    .actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--gold);
      color: #111;
      border: 1px solid var(--gold);
    }

    .btn-primary:hover {
      background: var(--gold-dark);
      border-color: var(--gold-dark);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: rgba(212,171,95,0.35);
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">Inquiry Received</div>
    <h1>Thank you.</h1>
    <p>Your inquiry has been submitted successfully.</p>
    <p>We will review your request and get back to you with a more focused catalog direction or next-step reply.</p>

    <div class="actions">
      <a class="btn btn-primary" href="index.html">Back to Homepage</a>
      <a class="btn btn-secondary" href="https://wa.me/8615347252138" target="_blank" rel="noopener">Chat on WhatsApp</a>
    </div>
  </main>
</body>
</html>
